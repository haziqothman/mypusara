name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  Docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 14

      - name: Setup git config
        run: |
          git config user.name "Github Actions Bot"
          git config user.email "<>"

      - name: Install dependencies (npm install)
        run: |
          if [ ! -f package-lock.json ]; then
            npm install  # Only runs if package-lock.json is missing
          fi
          npm ci  # Always run npm ci to install based on package-lock.json

      - name: Build
        run: npm run build

      - name: Upgrade npm to latest version
        run: npm install -g npm@latest

      - name: Save version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "::set-output name=tag::$VERSION"

      - name: Increase version
        run: npm version patch

      - name: Push new version
        run: git push

      - name: Login to DockerHub Registry
        run: echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag haziqothman:${{ steps.version.outputs.tag }}

      - name: Push to Docker Hub
        run: docker push haziqothman:${{ steps.version.outputs.tag }}
