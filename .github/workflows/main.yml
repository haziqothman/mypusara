name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  Docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '20'  # Update Node.js to version 20

      - name: Setup git config
        run: |
          git config user.name "Github Actions Bot"
          git config user.email "<>"

      - name: Install dependencies (npm install)
        run: |
          if [ ! -f package-lock.json ]; then
            npm install  # Only runs if package-lock.json is missing
          fi
          npm ci  # Always run npm ci to install based on package-lock.json

      - name: Build
        run: npm run build

      - name: Save version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "TAG=$VERSION" >> $GITHUB_ENV  # Set output for later use

      - name: Increase version
        run: npm version patch

      - name: Commit and push version change
        run: |
          git add package.json package-lock.json
          git commit -m "Bump version to ${{ env.TAG }}"
          git push

      - name: Login to DockerHub Registry
        run: echo ${{ secrets.DOCKERHUB_PASSWORD }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag haziqothman:${{ env.TAG }}

      - name: Push to Docker Hub
        run: docker push haziqothman:${{ env.TAG }}
